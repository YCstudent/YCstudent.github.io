<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="blog.html">博客</a></li>
                <li><a href="#categories">分类</a></li>
                <li><a href="#contact">联系我</a></li>
            </ul>
        </nav>
        <div class="hero">
            <h1>文章详情</h1>
            <p>查看完整内容</p>
        </div>
    </header>

    <main>
        <article id="article">
            <!-- JavaScript 会动态加载文章详情 -->
        </article>
    </main>

    <footer id="contact">
        <p>© 2024 个人博客 | 联系我: <a href="mailto:youremail@example.com">youremail@example.com</a></p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');
            fetch('data.json')
                .then(response => response.json())
                .then(data => {
                    const article = data.articles.find(a => a.id == articleId);
                    if (article) {
                        document.getElementById('article').innerHTML = `
                            <h2>${article.title}</h2>
                            <p class="date">发布日期: ${article.date}</p>
                            <img src="${article.image}" alt="${article.title}" />
                            <p>${article.content}</p>
                        `;
                    } else {
                        document.getElementById('article').innerHTML = '<p>文章未找到。</p>';
                    }
                })
                .catch(error => console.error('加载文章时出错:', error));
        });
    </script>
</body>
</html>
