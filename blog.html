<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客详情</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="blog-post">
        <h1 class="article-title">文章标题</h1>
        <p class="article-date">发布日期</p>
        <img class="article-image" src="" alt="文章图片" style="display: none;">
        <div class="article-content">
            文章内容
        </div>
    </div>

    <!-- 联系方式 -->
    <footer>
        <h3>联系我</h3>
        <p>电子邮件: <a href="mailto:yourname@example.com">yourname@example.com</a></p>
        <p>电话: <a href="tel:+123456789">+123456789</a></p>
        <p>社交媒体: 
            <a href="https://twitter.com/yourprofile" target="_blank">Twitter</a> | 
            <a href="https://linkedin.com/in/yourprofile" target="_blank">LinkedIn</a>
        </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
