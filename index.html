<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="#categories">分类</a></li>
                <li><a href="#contact">联系我</a></li>
                <li><a href="#photo-wall">照片墙</a></li>
            </ul>
        </nav>
        <div class="hero">
            <h1>欢迎来到JHCx330的个人博客</h1>
            <p>分享我的生活和感悟</p>

    <!-- 新增：照片墙按钮 -->
    <button id="photo-wall-link">显示照片墙</button>

    <!-- 新增：照片墙部分 -->
    <section id="photo-wall" class="hidden">
        <h2>照片墙</h2>
        <div class="photo-grid">
            <img src="images/微信图片_20241006221530.jpg" alt="照片1">
            <img src="images/微信图片_20241006221542.jpg" alt="照片2">
            <img src="images/微信图片_20241006221552.jpg" alt="照片3">
        </div>
    </section>

    <section id="carousel">
        <div class="carousel-container">
            <!-- 图片轮播 -->
        </div>
    </section>

    <!-- 模态框结构 -->
    <div id="photo-modal" class="modal hidden">
        <span class="close">&times;</span>
        <img class="modal-content" id="modal-image">
    </div>

    <section id="categories">
        <h2>文章分类</h2>
        <div class="category-list">
            <div class="category" data-category="编程">编程</div>
            <div class="category" data-category="游戏">游戏</div>
            <div class="category" data-category="日常">日常</div>
            <div class="category" data-category="学习">学习</div>
        </div>
    </section>

    <main>
        <section id="articles">
            <h2>最新文章</h2>
            <div class="article-list"></div>
            <div id="pagination">
                <button id="prevPage">上一页</button>
                <button id="nextPage">下一页</button>
            </div>
        </section>
    </main>
