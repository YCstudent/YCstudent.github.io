<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人博客 - 主页</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>欢迎来到我的个人博客</h1>
    </header>

    <!-- 图片轮播 -->
    <div class="carousel">
        <img src="images/slide1.jpg" alt="轮播图片1" class="carousel-img">
        <img src="images/slide2.jpg" alt="轮播图片2" class="carousel-img">
        <img src="images/slide3.jpg" alt="轮播图片3" class="carousel-img">
        <button id="pauseCarousel">暂停</button>
        <button id="resumeCarousel">继续</button>
    </div>

    <!-- 分类导航 -->
    <nav>
        <ul class="category-list">
            <li><a href="#" data-category="all">全部</a></li>
            <li><a href="#" data-category="技术">技术</a></li>
            <li><a href="#" data-category="生活">生活</a></li>
            <li><a href="#" data-category="旅行">旅行</a></li>
        </ul>
    </nav>

    <!-- 文章列表 -->
    <section class="article-list">
        <!-- 文章将动态加载 -->
    </section>

    <!-- 分页按钮 -->
    <div class="pagination">
        <button id="prevPage">上一页</button>
        <span id="currentPage"></span>
        <button id="nextPage">下一页</button>
    </div>

    <!-- 联系方式 -->
    <footer>
        <h3>联系我</h3>
        <p>电子邮件: <a href="mailto:yourname@example.com">yourname@example.com</a></p>
        <p>电话: <a href="tel:+123456789">+123456789</a></p>
        <p>社交媒体: 
            <a href="https://twitter.com/yourprofile" target="_blank">Twitter</a> | 
            <a href="https://linkedin.com/in/yourprofile" target="_blank">LinkedIn</a>
        </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
